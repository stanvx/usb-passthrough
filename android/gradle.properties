# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
org.gradle.parallel=true

# AndroidX package structure
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# Android build cache
android.enableBuildCache=true

# Non-transitive R classes
android.nonTransitiveRClass=true

# Disable AAPT2 daemon — AAPT2 8.2.0 has known daemon instability
# on CI runners (crashes with "Unexpected error during link").
# See .github/workflows/android-build.yml for related workflow tuning.
android.enableAapt2Jemalloc=false
