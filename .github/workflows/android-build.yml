# Android APK CI Build
#
# Builds AnyPlug phone APK, TV APK, runs lint, and uploads artifacts.
# Runs on every push to main and pull request.
# -------------------------------------------------------------------
name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS: 34.0.0
  ANDROID_CMDLINE_TOOLS: 11076708

jobs:
  build:
    name: Build Android APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK & NDK
        # Don't redirect output — we need to see NDK install errors
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;27.0.12077973"

      - name: Verify NDK install
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/27.0.12077973"
          if [ ! -d "$NDK_PATH" ]; then
            echo "::error::NDK not found at $NDK_PATH after sdkmanager install"
            ls -la "$ANDROID_HOME/ndk/" 2>&1 || true
            exit 1
          fi
          echo "NDK installed at $NDK_PATH"
          # Write local.properties so AGP can find the NDK on the CI runner
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ndk.dir=$NDK_PATH" >> android/local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run lint
        run: cd android && ./gradlew lintDebug --no-daemon

      - name: Build phone debug APK
        run: cd android && ./gradlew :app:assembleDebug

      - name: Build phone release APK
        run: cd android && ./gradlew :app:assembleRelease

      - name: Build TV release APK
        run: cd android && ./gradlew :tv:assembleRelease

      - name: Upload phone debug APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-phone-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload phone release APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-phone-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Upload TV release APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-tv-release
          path: android/tv/build/outputs/apk/release/tv-release.apk
          if-no-files-found: warn
