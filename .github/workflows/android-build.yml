# Android APK CI Build
#
# Builds AnyPlug phone APK, TV APK, runs lint, and uploads artifacts.
# Runs on every push to main and pull request.
# -------------------------------------------------------------------
name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

env:
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS: 34.0.0
  ANDROID_CMDLINE_TOOLS: 11076708

jobs:
  build:
    name: Build Android APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle Wrapper
        run: |
          # Generate wrapper in empty temp dir to avoid evaluating
          # android/ build scripts with system Gradle (9.x), which
          # is incompatible with AGP 8.2.0 used by the project.
          mkdir -p /tmp/gradle-init
          cd /tmp/gradle-init
          gradle wrapper --gradle-version 8.2
          cp -r gradle gradlew gradlew.bat "${{ github.workspace }}/android/"
          chmod +x "${{ github.workspace }}/android/gradlew"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run lint
        run: cd android && ./gradlew lintDebug

      - name: Build phone debug APK
        run: cd android && ./gradlew :app:assembleDebug

      - name: Build phone release APK
        run: cd android && ./gradlew :app:assembleRelease

      - name: Build TV release APK
        run: cd android && ./gradlew :tv:assembleRelease

      - name: Upload phone debug APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-phone-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload phone release APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-phone-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Upload TV release APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-tv-release
          path: android/tv/build/outputs/apk/release/tv-release.apk
          if-no-files-found: warn
