# Android APK CI Build
#
# Builds AnyPlug phone APK, TV APK, runs lint, and uploads artifacts.
# Runs on every push to main and pull request.
# -------------------------------------------------------------------
name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS: 34.0.0
  ANDROID_CMDLINE_TOOLS: 11076708

jobs:
  build:
    name: Build Android APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK & NDK
        # Robust sdkmanager detection — path varies across runner images
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER=$(ls -d "$ANDROID_SDK_ROOT/cmdline-tools/"*/bin/sdkmanager 2>/dev/null | head -1)
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "::error::sdkmanager not found"
            exit 1
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | $SDKMANAGER --sdk_root="$ANDROID_SDK_ROOT" --install \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;27.0.12077973"
          # Verify platforms installed
          if [ ! -d "$ANDROID_SDK_ROOT/platforms/android-${ANDROID_COMPILE_SDK}" ]; then
            echo "::error::platforms android-${ANDROID_COMPILE_SDK} not found after install"
            echo "Contents of $ANDROID_SDK_ROOT/platforms/:"
            ls -la "$ANDROID_SDK_ROOT/platforms/" 2>&1 || echo "(platforms/ missing)"
            exit 1
          fi
          echo "platforms android-${ANDROID_COMPILE_SDK} installed OK"

      - name: Verify NDK install
        run: |
          ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          # Find the actual NDK directory — sdkmanager may place it in a version-named subdir
          NDK_PATH=$(ls -d "$ANDROID_SDK_ROOT/ndk/"* 2>/dev/null | head -1)
          if [ -z "$NDK_PATH" ] || [ ! -d "$NDK_PATH" ]; then
            echo "::error::NDK not found after sdkmanager install"
            echo "Contents of $ANDROID_SDK_ROOT/ndk/:"
            ls -la "$ANDROID_SDK_ROOT/ndk/" 2>&1 || echo "(ndk/ missing)"
            exit 1
          fi
          echo "NDK installed at $NDK_PATH"
          # Verify build-tools
          BUILD_TOOLS_PATH="$ANDROID_SDK_ROOT/build-tools/${ANDROID_BUILD_TOOLS}"
          if [ ! -d "$BUILD_TOOLS_PATH" ]; then
            echo "::error::build-tools ${ANDROID_BUILD_TOOLS} not found"
            ls -la "$ANDROID_SDK_ROOT/build-tools/" 2>&1 || echo "(build-tools/ missing)"
            exit 1
          fi
          echo "build-tools ${ANDROID_BUILD_TOOLS} installed OK"
          # Write local.properties so AGP can find the SDK and NDK
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "ndk.dir=$NDK_PATH" >> android/local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run lint
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: cd android && ./gradlew lintDebug --no-daemon

      - name: Build phone debug APK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: cd android && ./gradlew :app:assembleDebug

      - name: Build phone release APK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: cd android && ./gradlew :app:assembleRelease

      - name: Build TV release APK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: cd android && ./gradlew :tv:assembleRelease
        continue-on-error: true

      - name: Upload phone debug APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-phone-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload phone release APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-phone-release
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Upload TV release APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-tv-release
          path: android/tv/build/outputs/apk/release/tv-release.apk
          if-no-files-found: warn
