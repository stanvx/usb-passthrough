# Windows Installer CI Build
#
# Cross-compiles the AnyPlug Windows binary and packages it as an NSIS installer.
# Runs on every push to main and pull request touching Windows-related paths.
# ---------------------------------------------------------------------------
name: Windows Installer Build

on:
  push:
    branches: [main]
    paths:
      - 'windows/**'
      - 'shared/**'
      - 'server/**'
      - 'client/**'
      - 'installer/windows/**'
      - '.github/workflows/windows-installer.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - 'windows/**'
      - 'shared/**'
      - 'server/**'
      - 'client/**'
      - 'installer/windows/**'
      - '.github/workflows/windows-installer.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-mingw-w64-x86-64 \
            libusb-1.0-0-dev \
            nsis

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-windows-${{ hashFiles('Cargo.lock') }}

      - name: Cross-compile Windows binary
        run: |
          cargo build --release --target x86_64-pc-windows-gnu -p anyplug

      - name: Verify binary
        run: |
          file target/x86_64-pc-windows-gnu/release/anyplug.exe
          ls -lh target/x86_64-pc-windows-gnu/release/anyplug.exe

      - name: Build NSIS installer
        run: |
          cd installer/windows
          makensis anyplug.nsi
          echo "Installer built:"
          ls -lh AnyPlug-*.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-windows-installer
          path: installer/windows/AnyPlug-*.exe
          if-no-files-found: error

      - name: Upload portable binary (no installer)
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-windows-portable
          path: target/x86_64-pc-windows-gnu/release/anyplug.exe
          if-no-files-found: error
