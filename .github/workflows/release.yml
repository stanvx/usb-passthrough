# ─── Release: Tag-based multi-platform build & publish ─────────────
# Triggers on tags matching v* (e.g. v0.1.0, v1.2.3-beta).
# Produces:
#   • Linux x86_64   – native binary
#   • Windows EXE    – built on windows-latest with MSVC toolchain
#   • Android APK    – phone release build
#   • Android TV APK – TV release build
# Auto-generates changelog from conventional commits since previous tag.
# All artifacts uploaded to a single GitHub Release.
# ────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Linux x86_64 ──────────────────────────────────────────────
  linux-x86_64:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libusb-1.0-0-dev

      - name: Build release binaries
        run: cargo build --release -p usbip-server -p usbip-client

      - name: Collect binaries
        run: |
          mkdir -p artifacts
          cp target/release/usbip-server artifacts/
          cp target/release/usbip-client artifacts/
          ls -lh artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-linux-x86_64
          path: artifacts/*
          if-no-files-found: error

  # ── Windows x86_64 ────────────────────────────────────────────
  windows:
    name: Windows (x86_64 EXE)
    runs-on: windows-latest
    env:
      RUSTFLAGS: -A dead_code -A unused_variables -A unexpected_cfgs
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSVC toolchain)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Build Windows binary (release)
        run: cargo build --release -p anyplug

      - name: Locate built EXE
        id: exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter "anyplug.exe" -Path target/release/ | Select-Object -First 1
          if ($exe) {
            echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_OUTPUT
            echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_OUTPUT
          } else {
            echo "EXE_PATH=" >> $env:GITHUB_OUTPUT
            echo "EXE_NAME=anyplug-x86_64-windows.exe" >> $env:GITHUB_OUTPUT
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-windows-x86_64
          path: ${{ steps.exe.outputs.EXE_PATH }}
          if-no-files-found: error

  # ── Android APK ───────────────────────────────────────────────
  android:
    name: Android (Phone APK + TV APK)
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_COMPILE_SDK: 34
      ANDROID_BUILD_TOOLS: 34.0.0
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Android SDK components
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          # sdkmanager path varies; try latest symlink first, fall back to versioned
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER=$(ls -d "$ANDROID_SDK_ROOT/cmdline-tools/"*/bin/sdkmanager 2>/dev/null | head -1)
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "::error::sdkmanager not found"
            exit 1
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | $SDKMANAGER --sdk_root="$ANDROID_SDK_ROOT" --install \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;27.0.12077973"
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> android/local.properties
          # Verify critical paths
          ls -d "$ANDROID_SDK_ROOT/platforms/android-${ANDROID_COMPILE_SDK}" || echo "::warning::platforms not found"
          ls -d "$ANDROID_SDK_ROOT/ndk/27.0.12077973" || echo "::warning::NDK not found"

      - name: Build phone release APK
        run: |
          chmod +x android/gradlew
          export ANDROID_HOME=/usr/local/lib/android/sdk
          cd android && ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Build TV release APK
        run: cd android && ./gradlew :tv:assembleRelease --no-daemon

      - name: Upload phone APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-android-phone
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: anyplug-android-tv
          path: android/tv/build/outputs/apk/release/tv-release.apk
          if-no-files-found: error

  # ── Publish: create GitHub Release with all artifacts ──────────
  publish:
    name: Publish Release
    needs:
      - linux-x86_64
      - windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for changelog

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Generate changelog from conventional commits
        id: changelog
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "${{ github.ref_name }}" | head -1 || echo "")

          # Generate changelog
          if [ -n "$PREV_TAG" ]; then
            bash ci/gen-changelog.sh "${{ github.ref_name }}" "$PREV_TAG" > _changelog.md
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          else
            bash ci/gen-changelog.sh "${{ github.ref_name }}" > _changelog.md
            echo "prev_tag=" >> $GITHUB_OUTPUT
          fi

          echo "=== Changelog generated ==="
          cat _changelog.md

      - name: Build release body
        id: body
        run: |
          {
            echo "## AnyPlug Release ${{ github.ref_name }}"
            echo ""
            echo "### Artifacts"
            echo ""
            echo "| Platform | Architecture | Binary |"
            echo "|----------|-------------|--------|"

            if [ -d "artifacts/anyplug-linux-x86_64" ]; then
              echo "| Linux | x86_64 | usbip-server, usbip-client |"
            fi
            if [ -d "artifacts/anyplug-windows-x86_64" ]; then
              echo "| Windows | x86_64 | anyplug.exe |"
            fi
            if [ -d "artifacts/anyplug-android-phone" ]; then
              echo "| Android Phone | Universal | app-release.apk |"
            fi
            if [ -d "artifacts/anyplug-android-tv" ]; then
              echo "| Android TV | Universal | tv-release.apk |"
            fi

            echo ""
            echo "---"
            echo ""
            cat _changelog.md
          } > _release_body.md

          echo "=== Release body ==="
          cat _release_body.md

      - name: List artifact files for upload
        run: |
          find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: _release_body.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: |
            artifacts/**/*
