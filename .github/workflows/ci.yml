# ─── CI: Continuous Integration ─────────────────────────────
# Runs on every push and pull request to the default branch.
#   • cargo check  – fast compilation check for Rust crates
#   • cargo test   – unit + integration tests for all Rust crates
#   • gradle lint  – Android lint for correctness, security & performance
# ────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: cargo check & test ──────────────────────────────
  rust:
    name: Rust (cargo check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: cargo check (all crates)
        run: cargo check --workspace --exclude anyplug

      - name: cargo test (all crates)
        run: cargo test --workspace --exclude anyplug

  # ── Android: Gradle lint ──────────────────────────────────
  android:
    name: Android (gradle lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"
          echo "ndk.dir=$ANDROID_HOME/ndk/27.0.12077973" >> android/local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew || true

      - name: Run lint (debug)
        run: cd android && ./gradlew lintDebug --no-daemon
        continue-on-error: true
